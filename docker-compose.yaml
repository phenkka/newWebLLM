services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.guardrails
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL-http://10.8.1.1:11434}
      - NEMO_GUARDRAILS_OLLAMA_URL=${NEMO_GUARDRAILS_OLLAMA_URL-http://10.8.1.1:11434}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY-}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  open-webui: {}
